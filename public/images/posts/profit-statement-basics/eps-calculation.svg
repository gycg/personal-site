<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">EPS 每股收益计算图</title>
  <desc id="desc">归母净利润 100 亿元除以总股本 50 亿股，得到 EPS 2 元每股。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">EPS 表示每一股股票对应多少利润</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" text-anchor="middle">
    <rect x="140" y="300" width="280" height="150" rx="16" fill="#e8f0e8" stroke="#92aa97"/><text x="280" y="360" fill="#23352b" font-size="27" font-weight="700">归母净利润</text><text x="280" y="415" fill="#2e5f49" font-size="40" font-weight="700">100 亿元</text>
    <text x="470" y="395" fill="#a2661b" font-size="58" font-weight="700">÷</text>
    <rect x="530" y="300" width="240" height="150" rx="16" fill="#fff8e8" stroke="#d0a35b"/><text x="650" y="360" fill="#23352b" font-size="27" font-weight="700">总股本</text><text x="650" y="415" fill="#a2661b" font-size="40" font-weight="700">50 亿股</text>
    <text x="820" y="395" fill="#2e5f49" font-size="58" font-weight="700">=</text>
    <rect x="880" y="300" width="200" height="150" rx="16" fill="#2e5f49"/><text x="980" y="360" fill="#fff" font-size="27" font-weight="700">EPS</text><text x="980" y="415" fill="#fff" font-size="40" font-weight="700">2 元/股</text>
  </g>
</svg>
