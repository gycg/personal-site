<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">利润表总览图</title>
  <desc id="desc">利润表展示营业收入扣除成本、费用和税费后得到净利润的过程。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">利润表看的是公司一段时间内的赚钱过程</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="27" font-weight="700">
    <rect x="160" y="220" width="240" height="70" rx="12" fill="#e8f0e8" stroke="#92aa97"/><text x="280" y="264" text-anchor="middle" fill="#23352b">营业收入</text>
    <text x="440" y="264" fill="#a2661b" font-size="38">-</text>
    <rect x="500" y="220" width="240" height="70" rx="12" fill="#f4ede7" stroke="#bd9477"/><text x="620" y="264" text-anchor="middle" fill="#23352b">营业成本</text>
    <text x="780" y="264" fill="#2e5f49" font-size="38">=</text>
    <rect x="840" y="220" width="210" height="70" rx="12" fill="#fff8e8" stroke="#d0a35b"/><text x="945" y="264" text-anchor="middle" fill="#23352b">毛利润</text>
    <path d="M945 310v48" stroke="#2e5f49" stroke-width="5" stroke-linecap="round"/><path d="M945 366l-13-18h26z" fill="#2e5f49"/>
    <rect x="355" y="382" width="490" height="70" rx="12" fill="#f4ede7" stroke="#bd9477"/><text x="600" y="426" text-anchor="middle" fill="#23352b">销售 / 管理 / 研发 / 财务费用</text>
    <path d="M600 470v48" stroke="#2e5f49" stroke-width="5" stroke-linecap="round"/><path d="M600 526l-13-18h26z" fill="#2e5f49"/>
    <rect x="255" y="542" width="230" height="70" rx="12" fill="#e8f0e8" stroke="#92aa97"/><text x="370" y="586" text-anchor="middle" fill="#23352b">营业利润</text>
    <rect x="515" y="542" width="170" height="70" rx="12" fill="#f4ede7" stroke="#bd9477"/><text x="600" y="586" text-anchor="middle" fill="#23352b">所得税等</text>
    <rect x="715" y="542" width="230" height="70" rx="12" fill="#fff8e8" stroke="#d0a35b"/><text x="830" y="586" text-anchor="middle" fill="#23352b">净利润</text>
  </g>
</svg>
