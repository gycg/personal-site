<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">毛利润与毛利率计算图</title>
  <desc id="desc">营业收入 100 亿元，营业成本 60 亿元，毛利润 40 亿元，毛利率为 40%。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">毛利率看的是每卖 1 元，能留下多少初步利润</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="170" y="245" width="230" height="260" rx="14" fill="#e8f0e8" stroke="#92aa97"/>
    <text x="285" y="325" fill="#23352b" font-size="28" font-weight="700" text-anchor="middle">营业收入</text>
    <text x="285" y="395" fill="#2e5f49" font-size="46" font-weight="700" text-anchor="middle">100 亿元</text>
    <text x="443" y="390" fill="#a2661b" font-size="52" font-weight="700">-</text>
    <rect x="505" y="305" width="220" height="200" rx="14" fill="#f4ede7" stroke="#bd9477"/>
    <text x="615" y="365" fill="#23352b" font-size="27" font-weight="700" text-anchor="middle">营业成本</text>
    <text x="615" y="435" fill="#a2661b" font-size="42" font-weight="700" text-anchor="middle">60 亿元</text>
    <text x="770" y="390" fill="#2e5f49" font-size="52" font-weight="700">=</text>
    <rect x="830" y="365" width="220" height="140" rx="14" fill="#fff8e8" stroke="#d0a35b"/>
    <text x="940" y="413" fill="#23352b" font-size="27" font-weight="700" text-anchor="middle">毛利润</text>
    <text x="940" y="468" fill="#a2661b" font-size="40" font-weight="700" text-anchor="middle">40 亿元</text>
    <rect x="335" y="560" width="530" height="54" rx="12" fill="#2e5f49"/>
    <text x="600" y="596" fill="#fff" font-size="28" font-weight="700" text-anchor="middle">毛利率 = 40 ÷ 100 = 40%</text>
  </g>
</svg>
