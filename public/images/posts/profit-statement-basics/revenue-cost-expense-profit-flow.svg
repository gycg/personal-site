<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">收入、成本、费用、利润关系图</title>
  <desc id="desc">收入扣掉直接成本，再扣掉各类费用，最后剩下利润。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">利润是收入扣掉成本和费用后的结果</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" text-anchor="middle">
    <rect x="430" y="210" width="340" height="70" rx="14" fill="#e8f0e8" stroke="#92aa97"/><text x="600" y="254" fill="#23352b" font-size="30" font-weight="700">收入进来</text>
    <path d="M600 296v54" stroke="#a2661b" stroke-width="6" stroke-linecap="round"/><path d="M600 360l-15-21h30z" fill="#a2661b"/>
    <rect x="430" y="375" width="340" height="70" rx="14" fill="#fff8e8" stroke="#d0a35b"/><text x="600" y="419" fill="#23352b" font-size="30" font-weight="700">扣掉直接成本</text>
    <path d="M600 461v54" stroke="#a2661b" stroke-width="6" stroke-linecap="round"/><path d="M600 525l-15-21h30z" fill="#a2661b"/>
    <rect x="300" y="540" width="600" height="70" rx="14" fill="#f4ede7" stroke="#bd9477"/><text x="600" y="584" fill="#23352b" font-size="30" font-weight="700">扣掉销售、管理、研发、财务费用，剩下利润</text>
  </g>
</svg>
