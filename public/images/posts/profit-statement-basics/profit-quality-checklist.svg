<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">利润质量检查清单图</title>
  <desc id="desc">利润质量要看收入是否来自主营业务、毛利率是否稳定、费用率是否可控、扣非净利润是否同步增长、是否依赖一次性收益、现金流是否跟得上利润。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">好利润，不只要高，还要真实、可持续、有现金流支撑</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="27" fill="#23352b">
    <rect x="165" y="215" width="870" height="355" rx="16" fill="#fff" stroke="#b7c6b8"/>
    <text x="215" y="285">□ 收入是否来自主营业务？</text>
    <text x="215" y="340">□ 毛利率是否稳定？</text>
    <text x="215" y="395">□ 费用率是否可控？</text>
    <text x="215" y="450">□ 扣非净利润是否同步增长？</text>
    <text x="215" y="505">□ 是否依赖一次性收益？</text>
    <text x="215" y="560">□ 现金流是否跟得上利润？</text>
  </g>
</svg>
