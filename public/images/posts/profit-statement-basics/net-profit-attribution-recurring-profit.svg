<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">净利润、归母净利润和扣非净利润关系图</title>
  <desc id="desc">净利润扣除少数股东损益得到归母净利润，再扣除非经常性损益得到扣非归母净利润。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">看利润质量，不能只看净利润</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" text-anchor="middle">
    <rect x="420" y="220" width="360" height="76" rx="14" fill="#e8f0e8" stroke="#92aa97"/><text x="600" y="268" fill="#23352b" font-size="31" font-weight="700">净利润</text>
    <text x="600" y="340" fill="#617166" font-size="23">扣除少数股东损益</text><path d="M600 305v62" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/><path d="M600 374l-13-18h26z" fill="#a2661b"/>
    <rect x="420" y="390" width="360" height="76" rx="14" fill="#fff8e8" stroke="#d0a35b"/><text x="600" y="438" fill="#23352b" font-size="31" font-weight="700">归母净利润</text>
    <text x="600" y="510" fill="#617166" font-size="23">扣除非经常性损益</text><path d="M600 475v62" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/><path d="M600 544l-13-18h26z" fill="#a2661b"/>
    <rect x="420" y="560" width="360" height="76" rx="14" fill="#2e5f49"/><text x="600" y="608" fill="#fff" font-size="31" font-weight="700">扣非归母净利润</text>
    <text x="220" y="420" fill="#617166" font-size="22">归母：属于上市公司股东的钱</text>
    <text x="950" y="590" fill="#617166" font-size="22" text-anchor="middle">扣非：更接近主营业务真实盈利</text>
  </g>
</svg>
