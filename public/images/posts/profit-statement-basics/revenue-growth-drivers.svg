<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">营业收入增长拆解图</title>
  <desc id="desc">营业收入增长可能来自销量增加、产品涨价、新产品放量、新市场扩张和并购合并收入。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">收入增长要看原因，不只看数字</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="410" y="205" width="380" height="76" rx="14" fill="#2e5f49"/><text x="600" y="254" fill="#fff" font-size="30" font-weight="700" text-anchor="middle">营业收入增长来自哪里？</text>
    <g font-size="26" font-weight="700" fill="#23352b">
      <rect x="180" y="350" width="220" height="64" rx="12" fill="#e8f0e8" stroke="#92aa97"/><text x="290" y="391" text-anchor="middle">销量增加</text>
      <rect x="490" y="350" width="220" height="64" rx="12" fill="#fff8e8" stroke="#d0a35b"/><text x="600" y="391" text-anchor="middle">产品涨价</text>
      <rect x="800" y="350" width="220" height="64" rx="12" fill="#e8f0e8" stroke="#92aa97"/><text x="910" y="391" text-anchor="middle">新产品放量</text>
      <rect x="335" y="490" width="220" height="64" rx="12" fill="#fff8e8" stroke="#d0a35b"/><text x="445" y="531" text-anchor="middle">新市场扩张</text>
      <rect x="645" y="490" width="220" height="64" rx="12" fill="#e8f0e8" stroke="#92aa97"/><text x="755" y="531" text-anchor="middle">并购合并收入</text>
    </g>
  </g>
</svg>
