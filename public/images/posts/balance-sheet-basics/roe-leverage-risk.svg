<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">资产负债率与 ROE 组合图</title>
  <desc id="desc">高 ROE 可能来自经营优秀，也可能来自高负债杠杆，因此要同时看 ROE、资产负债率和现金流。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">高 ROE 不一定都是好事，要看是不是靠高杠杆撑起来的</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" text-anchor="middle">
    <rect x="430" y="215" width="340" height="76" rx="14" fill="#2e5f49"/><text x="600" y="263" fill="#fff" font-size="32" font-weight="700">ROE 高</text>
    <path d="M600 306v56M600 362H350M600 362h250M350 362v50M850 362v50" fill="none" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/>
    <rect x="170" y="430" width="360" height="100" rx="14" fill="#e8f0e8" stroke="#92aa97"/><text x="350" y="490" fill="#23352b" font-size="28" font-weight="700">可能来自经营优秀</text>
    <rect x="670" y="430" width="360" height="100" rx="14" fill="#f4ede7" stroke="#bd9477"/><text x="850" y="490" fill="#23352b" font-size="28" font-weight="700">也可能来自高负债杠杆</text>
    <rect x="330" y="565" width="540" height="54" rx="12" fill="#fff8e8" stroke="#d0a35b"/><text x="600" y="601" fill="#23352b" font-size="25" font-weight="700">同时看：ROE + 资产负债率 + 现金流</text>
  </g>
</svg>
