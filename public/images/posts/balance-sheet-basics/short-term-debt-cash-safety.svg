<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">短债与现金安全图</title>
  <desc id="desc">A 公司货币资金 100 亿，短期借款 20 亿，短期压力较小；B 公司货币资金 10 亿，短期借款 80 亿，短期偿债压力大。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">看短期风险，要把现金和短期债务放在一起看</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="150" y="230" width="900" height="300" rx="14" fill="#fff" stroke="#b7c6b8"/>
    <line x1="150" y1="310" x2="1050" y2="310" stroke="#b7c6b8"/><line x1="150" y1="420" x2="1050" y2="420" stroke="#b7c6b8"/><line x1="360" y1="230" x2="360" y2="530" stroke="#b7c6b8"/><line x1="585" y1="230" x2="585" y2="530" stroke="#b7c6b8"/><line x1="810" y1="230" x2="810" y2="530" stroke="#b7c6b8"/>
    <text x="255" y="280" font-size="25" font-weight="700" fill="#2e5f49" text-anchor="middle">公司</text><text x="472" y="280" font-size="25" font-weight="700" fill="#2e5f49" text-anchor="middle">货币资金</text><text x="698" y="280" font-size="25" font-weight="700" fill="#2e5f49" text-anchor="middle">短期借款</text><text x="930" y="280" font-size="25" font-weight="700" fill="#2e5f49" text-anchor="middle">初步判断</text>
    <text x="255" y="378" font-size="25" font-weight="700" fill="#23352b" text-anchor="middle">A 公司</text><text x="472" y="378" font-size="25" fill="#23352b" text-anchor="middle">100 亿</text><text x="698" y="378" font-size="25" fill="#23352b" text-anchor="middle">20 亿</text><text x="930" y="378" font-size="25" fill="#2e5f49" text-anchor="middle">短期压力较小</text>
    <text x="255" y="488" font-size="25" font-weight="700" fill="#23352b" text-anchor="middle">B 公司</text><text x="472" y="488" font-size="25" fill="#23352b" text-anchor="middle">10 亿</text><text x="698" y="488" font-size="25" fill="#23352b" text-anchor="middle">80 亿</text><text x="930" y="488" font-size="25" fill="#a2661b" text-anchor="middle">偿债压力大</text>
  </g>
</svg>
