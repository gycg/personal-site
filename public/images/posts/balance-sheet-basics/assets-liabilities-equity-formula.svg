<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">资产等于负债加所有者权益</title>
  <desc id="desc">资产 100 万元等于负债 40 万元加所有者权益 60 万元。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">公司资产的来源：一部分借来的，一部分属于股东</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" text-anchor="middle" font-weight="700">
    <rect x="155" y="300" width="250" height="130" rx="16" fill="#e8f0e8" stroke="#92aa97"/><text x="280" y="355" fill="#23352b" font-size="30">资产</text><text x="280" y="405" fill="#2e5f49" font-size="42">100 万元</text>
    <text x="455" y="385" fill="#2e5f49" font-size="58">=</text>
    <rect x="520" y="330" width="210" height="100" rx="14" fill="#f4ede7" stroke="#bd9477"/><text x="625" y="372" fill="#23352b" font-size="26">负债</text><text x="625" y="412" fill="#a2661b" font-size="34">40 万元</text>
    <text x="775" y="390" fill="#a2661b" font-size="48">+</text>
    <rect x="840" y="280" width="230" height="150" rx="14" fill="#fff8e8" stroke="#d0a35b"/><text x="955" y="340" fill="#23352b" font-size="26">所有者权益</text><text x="955" y="395" fill="#a2661b" font-size="36">60 万元</text>
  </g>
</svg>
