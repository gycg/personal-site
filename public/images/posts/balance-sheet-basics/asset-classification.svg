<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">资产分类图</title>
  <desc id="desc">资产分为流动资产和非流动资产。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="40" font-weight="700">资产不只看多少，还要看能不能变成钱、质量好不好</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="170" y="235" width="385" height="300" rx="16" fill="#e8f0e8" stroke="#92aa97"/>
    <text x="362" y="300" fill="#2e5f49" font-size="34" font-weight="700" text-anchor="middle">流动资产</text>
    <text x="230" y="365" fill="#23352b" font-size="25">货币资金</text><text x="230" y="420" fill="#23352b" font-size="25">应收账款</text><text x="230" y="475" fill="#23352b" font-size="25">存货</text>
    <rect x="645" y="235" width="385" height="300" rx="16" fill="#fff8e8" stroke="#d0a35b"/>
    <text x="838" y="300" fill="#a2661b" font-size="34" font-weight="700" text-anchor="middle">非流动资产</text>
    <text x="705" y="365" fill="#23352b" font-size="25">固定资产</text><text x="705" y="420" fill="#23352b" font-size="25">无形资产</text><text x="705" y="475" fill="#23352b" font-size="25">长期投资 / 商誉</text>
  </g>
</svg>
