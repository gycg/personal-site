<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">竞争优势护城河图</title>
  <desc id="desc">品牌、技术、成本、渠道、规模、客户粘性、资源或牌照共同构成竞争优势。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="78" width="1060" height="564" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="150" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">竞争优势决定公司能不能长期赚钱</text>
  <ellipse cx="600" cy="398" rx="360" ry="160" fill="none" stroke="#8fb7a0" stroke-width="42"/>
  <ellipse cx="600" cy="398" rx="245" ry="98" fill="#e8f0e8" stroke="#2e5f49" stroke-width="3"/>
  <text x="600" y="385" fill="#23352b" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700" text-anchor="middle">公司</text>
  <text x="600" y="428" fill="#617166" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="22" text-anchor="middle">长期盈利能力</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="23" font-weight="700" text-anchor="middle">
    <rect x="190" y="245" width="138" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="259" y="278" fill="#23352b">品牌优势</text>
    <rect x="432" y="214" width="138" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="501" y="247" fill="#23352b">技术优势</text>
    <rect x="652" y="214" width="138" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="721" y="247" fill="#23352b">成本优势</text>
    <rect x="872" y="245" width="138" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="941" y="278" fill="#23352b">渠道优势</text>
    <rect x="248" y="524" width="138" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="317" y="557" fill="#23352b">规模优势</text>
    <rect x="506" y="555" width="138" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="575" y="588" fill="#23352b">客户粘性</text>
    <rect x="764" y="524" width="170" height="50" rx="25" fill="#fff8e8" stroke="#d0a35b"/><text x="849" y="557" fill="#23352b">资源 / 牌照</text>
  </g>
</svg>
