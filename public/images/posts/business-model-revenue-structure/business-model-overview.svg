<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">商业模式总览图</title>
  <desc id="desc">产品或服务经过客户、收入、成本、利润和增长，形成公司的商业模式。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <path d="M0 120h1200M0 240h1200M0 360h1200M0 480h1200M0 600h1200M200 0v720M400 0v720M600 0v720M800 0v720M1000 0v720" stroke="#d8e0d8" stroke-width="1"/>
  <rect x="70" y="78" width="1060" height="564" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="150" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">看公司，先看它如何把产品变成利润</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="25" font-weight="700" text-anchor="middle">
    <g>
      <rect x="105" y="275" width="140" height="88" rx="12" fill="#e8f0e8" stroke="#92aa97"/>
      <text x="175" y="326" fill="#23352b">产品 / 服务</text>
    </g>
    <path d="M260 319h58" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/><path d="M318 319l-15-10v20z" fill="#a2661b"/>
    <g>
      <rect x="335" y="275" width="118" height="88" rx="12" fill="#fff8e8" stroke="#d0a35b"/>
      <text x="394" y="326" fill="#23352b">客户</text>
    </g>
    <path d="M468 319h58" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/><path d="M526 319l-15-10v20z" fill="#a2661b"/>
    <g>
      <rect x="543" y="275" width="118" height="88" rx="12" fill="#e8f0e8" stroke="#92aa97"/>
      <text x="602" y="326" fill="#23352b">收入</text>
    </g>
    <path d="M676 319h58" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/><path d="M734 319l-15-10v20z" fill="#a2661b"/>
    <g>
      <rect x="751" y="275" width="118" height="88" rx="12" fill="#f4ede7" stroke="#bd9477"/>
      <text x="810" y="326" fill="#23352b">成本</text>
    </g>
    <path d="M884 319h58" stroke="#a2661b" stroke-width="5" stroke-linecap="round"/><path d="M942 319l-15-10v20z" fill="#a2661b"/>
    <g>
      <rect x="959" y="275" width="118" height="88" rx="12" fill="#e8f0e8" stroke="#92aa97"/>
      <text x="1018" y="326" fill="#23352b">利润</text>
    </g>
  </g>
  <path d="M1018 382c0 75-96 104-226 104H410c-132 0-235-30-235-104" fill="none" stroke="#2e5f49" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 12"/>
  <text x="600" y="532" fill="#2e5f49" font-family="Noto Sans SC, PingFang SC, sans-serif" font-size="28" font-weight="700" text-anchor="middle">利润再投入，推动下一轮增长</text>
</svg>
