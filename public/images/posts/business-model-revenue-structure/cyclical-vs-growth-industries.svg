<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">周期性行业与成长性行业对比图</title>
  <desc id="desc">周期性行业重点看供需、价格、库存、产能，成长性行业重点看增速、竞争格局、盈利兑现。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="78" width="1060" height="564" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="150" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">周期股看景气位置，成长股看增长质量</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="130" y="235" width="440" height="300" rx="16" fill="#fff8e8" stroke="#d0a35b"/>
    <text x="350" y="300" fill="#a2661b" font-size="34" font-weight="700" text-anchor="middle">周期性行业</text>
    <text x="350" y="365" fill="#23352b" font-size="25" font-weight="700" text-anchor="middle">利润随景气周期波动</text>
    <text x="350" y="430" fill="#617166" font-size="23" text-anchor="middle">重点看：供需、价格、库存、产能</text>
    <path d="M210 486c45-70 88-70 132 0s88 70 132 0" fill="none" stroke="#a2661b" stroke-width="6" stroke-linecap="round"/>
    <rect x="630" y="235" width="440" height="300" rx="16" fill="#e8f0e8" stroke="#92aa97"/>
    <text x="850" y="300" fill="#2e5f49" font-size="34" font-weight="700" text-anchor="middle">成长性行业</text>
    <text x="850" y="365" fill="#23352b" font-size="25" font-weight="700" text-anchor="middle">市场空间持续扩大</text>
    <text x="850" y="430" fill="#617166" font-size="23" text-anchor="middle">重点看：增速、竞争格局、盈利兑现</text>
    <path d="M720 505l230-135" fill="none" stroke="#2e5f49" stroke-width="6" stroke-linecap="round"/>
    <path d="M950 370l-14 25 30-8z" fill="#2e5f49"/>
  </g>
</svg>
