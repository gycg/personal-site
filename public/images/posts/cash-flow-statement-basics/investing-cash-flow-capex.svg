<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">投资活动现金流和资本开支</title>
  <desc id="desc">投资活动现金流包括建厂房、买设备、建生产线、收购公司和购买长期资产，资本开支是为未来长期经营投入的钱。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">投资现金流为负不一定坏，关键看投得值不值</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="135" y="215" width="930" height="260" rx="18" fill="#fff8dc" stroke="#d8bd67"/>
    <text x="185" y="280" fill="#6a5414" font-size="32" font-weight="700">投资活动现金流</text>
    <g fill="#23352b" font-size="27">
      <text x="205" y="350">建厂房</text>
      <text x="385" y="350">买设备</text>
      <text x="565" y="350">建生产线</text>
      <text x="205" y="420">收购公司</text>
      <text x="385" y="420">购买长期资产</text>
      <text x="645" y="420">对外投资</text>
    </g>
    <path d="M600 475v62" stroke="#c3a34d" stroke-width="4" stroke-linecap="round"/>
    <path d="M600 537l-14-20h28z" fill="#c3a34d"/>
    <rect x="250" y="545" width="700" height="72" rx="14" fill="#fff" stroke="#b7c6b8"/>
    <text x="600" y="591" text-anchor="middle" fill="#2e5f49" font-size="30" font-weight="700">资本开支：为未来长期经营投入的钱</text>
  </g>
</svg>
