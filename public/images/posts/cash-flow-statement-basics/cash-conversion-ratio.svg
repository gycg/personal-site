<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">净现比计算</title>
  <desc id="desc">净现比等于经营活动现金流净额除以净利润。净利润 10 亿元、经营现金流 12 亿元时净现比为 1.2；经营现金流 2 亿元时净现比为 0.2。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">净现比越高，利润越有现金流支撑</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="230" y="205" width="740" height="80" rx="14" fill="#2e5f49"/>
    <text x="600" y="257" text-anchor="middle" fill="#fff" font-size="34" font-weight="700">净现比 = 经营活动现金流净额 ÷ 净利润</text>
    <rect x="155" y="365" width="410" height="175" rx="18" fill="#e6efe8" stroke="#9cb39e"/>
    <text x="360" y="425" text-anchor="middle" fill="#2e5f49" font-size="30" font-weight="700">现金流支撑较好</text>
    <text x="360" y="480" text-anchor="middle" fill="#23352b" font-size="28">12 ÷ 10 = 1.2</text>
    <rect x="635" y="365" width="410" height="175" rx="18" fill="#fff3e6" stroke="#d6aa7a"/>
    <text x="840" y="425" text-anchor="middle" fill="#7a4d21" font-size="30" font-weight="700">利润质量需警惕</text>
    <text x="840" y="480" text-anchor="middle" fill="#23352b" font-size="28">2 ÷ 10 = 0.2</text>
  </g>
</svg>
