<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">利润和现金流的区别</title>
  <desc id="desc">卖出商品后，利润表可以确认收入，但客户三个月后付款时，现金流暂时还没有现金流入。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="70" width="1060" height="580" rx="20" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="140" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">利润是会计结果，现金流是真正到账的钱</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="125" y="235" width="210" height="130" rx="16" fill="#e6efe8" stroke="#9cb39e"/>
    <text x="230" y="288" text-anchor="middle" fill="#23352b" font-size="30" font-weight="700">卖出商品</text>
    <text x="230" y="330" text-anchor="middle" fill="#5e6f63" font-size="24">合同 100 万元</text>
    <path d="M355 300H465" stroke="#6f846f" stroke-width="4" stroke-linecap="round"/>
    <path d="M465 300l-18-12v24z" fill="#6f846f"/>
    <rect x="490" y="210" width="250" height="180" rx="18" fill="#fff" stroke="#b7c6b8"/>
    <text x="615" y="274" text-anchor="middle" fill="#2e5f49" font-size="30" font-weight="700">利润表</text>
    <text x="615" y="322" text-anchor="middle" fill="#23352b" font-size="25">确认收入</text>
    <text x="615" y="358" text-anchor="middle" fill="#5e6f63" font-size="22">账面已有利润</text>
    <path d="M765 300H875" stroke="#c3a34d" stroke-width="4" stroke-linecap="round"/>
    <path d="M875 300l-18-12v24z" fill="#c3a34d"/>
    <rect x="900" y="235" width="200" height="130" rx="16" fill="#fff8dc" stroke="#d8bd67"/>
    <text x="1000" y="288" text-anchor="middle" fill="#6a5414" font-size="28" font-weight="700">三个月后</text>
    <text x="1000" y="330" text-anchor="middle" fill="#6a5414" font-size="23">客户付款</text>
    <rect x="250" y="470" width="700" height="74" rx="14" fill="#fff" stroke="#d8bd67"/>
    <text x="600" y="518" text-anchor="middle" fill="#6a5414" font-size="28" font-weight="700">现金流：付款前暂时没有现金流入</text>
  </g>
</svg>
