<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">经营活动现金流</title>
  <desc id="desc">经营现金流入包括客户付款和服务收款，经营现金流出包括采购付款、工资、税费和日常费用，净额等于流入减流出。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">经营现金流看的是公司主业能不能自己造血</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="135" y="230" width="360" height="270" rx="18" fill="#e6efe8" stroke="#9cb39e"/>
    <text x="315" y="290" text-anchor="middle" fill="#2e5f49" font-size="32" font-weight="700">经营现金流入</text>
    <text x="190" y="355" fill="#23352b" font-size="26">+ 客户付款</text>
    <text x="190" y="405" fill="#23352b" font-size="26">+ 销售收款</text>
    <text x="190" y="455" fill="#23352b" font-size="26">+ 服务收款</text>
    <rect x="705" y="230" width="360" height="270" rx="18" fill="#fff3e6" stroke="#d6aa7a"/>
    <text x="885" y="290" text-anchor="middle" fill="#7a4d21" font-size="32" font-weight="700">经营现金流出</text>
    <text x="760" y="355" fill="#23352b" font-size="26">- 采购付款</text>
    <text x="760" y="405" fill="#23352b" font-size="26">- 员工工资</text>
    <text x="760" y="455" fill="#23352b" font-size="26">- 税费和日常费用</text>
    <path d="M515 365h170" stroke="#6f846f" stroke-width="4" stroke-linecap="round"/>
    <text x="600" y="350" text-anchor="middle" fill="#5e6f63" font-size="34" font-weight="700">-</text>
    <rect x="315" y="555" width="570" height="62" rx="14" fill="#fff" stroke="#b7c6b8"/>
    <text x="600" y="596" text-anchor="middle" fill="#2e5f49" font-size="30" font-weight="700">经营活动现金流净额 = 流入 - 流出</text>
  </g>
</svg>
