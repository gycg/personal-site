<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">现金流量表三大部分</title>
  <desc id="desc">现金流量表分为经营活动现金流、投资活动现金流和筹资活动现金流。</desc>
  <rect width="1200" height="720" fill="#f0f4ef"/>
  <rect x="70" y="72" width="1060" height="576" rx="18" fill="#fbfcfa" stroke="#b7c6b8" stroke-width="2"/>
  <text x="110" y="145" fill="#2e5f49" font-family="Noto Serif SC, Songti SC, serif" font-size="42" font-weight="700">看现金流，要先分清钱从哪里来、到哪里去</text>
  <g font-family="Noto Sans SC, PingFang SC, sans-serif">
    <rect x="420" y="210" width="360" height="80" rx="14" fill="#2e5f49"/>
    <text x="600" y="262" text-anchor="middle" fill="#fff" font-size="34" font-weight="700">现金流量表</text>
    <path d="M600 290v62M270 352h660M270 352v52M600 352v52M930 352v52" fill="none" stroke="#6f846f" stroke-width="4" stroke-linecap="round"/>
    <g font-size="28" font-weight="700">
      <rect x="130" y="410" width="280" height="150" rx="18" fill="#e6efe8" stroke="#9cb39e"/>
      <text x="270" y="472" text-anchor="middle" fill="#2e5f49">经营活动现金流</text>
      <text x="270" y="516" text-anchor="middle" fill="#5e6f63" font-size="23">主业造血</text>
      <rect x="460" y="410" width="280" height="150" rx="18" fill="#fff8dc" stroke="#d8bd67"/>
      <text x="600" y="472" text-anchor="middle" fill="#6a5414">投资活动现金流</text>
      <text x="600" y="516" text-anchor="middle" fill="#84691f" font-size="23">投向未来</text>
      <rect x="790" y="410" width="280" height="150" rx="18" fill="#edf3f7" stroke="#a9bcc8"/>
      <text x="930" y="472" text-anchor="middle" fill="#335b6f">筹资活动现金流</text>
      <text x="930" y="516" text-anchor="middle" fill="#587383" font-size="23">借钱、还钱、分红</text>
    </g>
  </g>
</svg>
